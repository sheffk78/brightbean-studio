{% extends "base.html" %}
{% block page_title %}{{ workspace.name }}{% endblock %}

{% block content %}
<div>
    <!-- Workspace header -->
    <div class="w-full flex items-center justify-between" style="margin-bottom: 32px;">
        <h2 style="
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.015em;
            margin-bottom: 4px;
        ">{{ workspace.name }}</h2>
        <a href="{% url 'workspaces:settings' workspace_id=workspace.id %}" class="p-2 rounded-lg text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors" title="Workspace Settings">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </a>
    </div>
        {% if workspace.description %}
        <p style="font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.7;">{{ workspace.description }}</p>
        {% endif %}
    </div>

    <!-- Dynamic onboarding checklist -->
    {% include "onboarding/partials/_checklist.html" %}
</div>
{% endblock %}
